<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a9eff"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Five lines arcing bottom-left to upper-right, starting bundled then diverging with wave variation -->
  <g filter="url(#glow)">
    <!-- Line 1: slight upward drift -->
    <path d="M 30,168 C 42,154 50,134 64,114 C 78,94 86,78 102,60 C 118,42 134,30 154,20 C 166,14 174,10 184,6"
          fill="none" stroke="url(#g1)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Line 2: mild wave up then down -->
    <path d="M 32,170 C 44,157 54,140 68,122 C 80,106 92,90 108,76 C 122,63 140,52 158,44 C 170,38 178,38 188,35"
          fill="none" stroke="url(#g2)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Line 3: center baseline -->
    <path d="M 34,172 C 46,160 56,146 70,130 C 84,114 96,100 112,88 C 128,76 144,66 162,58 C 174,52 182,52 192,49"
          fill="none" stroke="url(#g3)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Line 4: mild wave down then up -->
    <path d="M 36,174 C 48,163 58,152 74,138 C 90,124 100,114 116,102 C 132,90 150,82 168,76 C 180,71 186,74 196,72"
          fill="none" stroke="url(#g4)" stroke-width="4.5" stroke-linecap="round"/>
    <!-- Line 5: stronger downward drift -->
    <path d="M 38,176 C 50,166 62,158 78,148 C 94,138 106,130 122,120 C 138,110 156,102 174,98 C 186,95 192,100 200,99"
          fill="none" stroke="url(#g5)" stroke-width="4.5" stroke-linecap="round"/>
  </g>
</svg>
