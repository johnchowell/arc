version: '3.8'

# ArcSearch Distributed Worker — Sandboxed Deployment
# Resources are capped and the worker runs in an isolated network namespace.

services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - worker_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - qdrant
    environment:
      - DISTRIBUTED_MODE=true
      - HUB_ROLE=worker
      - HUB_URL=${HUB_URL}
      - WORKER_API_KEY=${WORKER_API_KEY}
      - WORKER_ID=${WORKER_ID}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - CRAWL_ONLY=true
      - CRAWLER_WORKERS=50
      - CRAWLER_RATE_LIMIT=0.1
      - RAID_PATH=/app/data
      - WEBINDEX_DIR=/app/data
    ports:
      - "${WORKER_PORT:-8901}:8901"
    volumes:
      - worker_data:/app/data
    networks:
      - worker_internal
      - worker_external
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 2G
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Uncomment for GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

networks:
  worker_internal:
    # Isolated network: qdrant only reachable by worker, not from host
    internal: true
  worker_external:
    # Worker needs outbound for crawling + hub communication

volumes:
  qdrant_data:
  worker_data:
